<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }
    .box { fill: #161b22; stroke: #30363d; stroke-width: 2px; rx: 6px; }
    .box-glow { fill: #161b22; stroke: #388bfd; stroke-width: 2px; rx: 6px; filter: drop-shadow(0px 0px 8px rgba(56, 139, 253, 0.2)); }
    .box-db { fill: #161b22; stroke: #8957e5; stroke-width: 2px; rx: 6px; }
    .text-title { fill: #c9d1d9; font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 600; }
    .text-sub { fill: #8b949e; font-family: monospace; font-size: 11px; }
    .route { fill: none; stroke: #30363d; stroke-width: 2px; stroke-dasharray: 4 4; }
    .packet-blue { fill: #58a6ff; filter: drop-shadow(0 0 4px #58a6ff); }
    .packet-purple { fill: #bc8cff; filter: drop-shadow(0 0 4px #bc8cff); }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <path id="path-api" d="M 160 200 L 220 200" class="route" />
  
  <path id="path-dns" d="M 340 200 C 380 200, 380 100, 420 100" class="route" />
  <path id="path-net" d="M 340 200 L 420 200" class="route" />
  <path id="path-web" d="M 340 200 C 380 200, 380 300, 420 300" class="route" />

  <path id="path-eng-1" d="M 580 100 C 620 100, 620 200, 660 200" class="route" />
  <path id="path-eng-2" d="M 580 200 L 660 200" class="route" />
  <path id="path-eng-3" d="M 580 300 C 620 300, 620 200, 660 200" class="route" />

  <path id="path-db" d="M 800 200 L 860 200" class="route" />

  <rect x="40" y="170" width="120" height="60" class="box" />
  <text x="100" y="195" class="text-title" text-anchor="middle">React UI</text>
  <text x="100" y="215" class="text-sub" text-anchor="middle">Tactical View</text>

  <rect x="220" y="170" width="120" height="60" class="box" />
  <text x="280" y="195" class="text-title" text-anchor="middle">FastAPI</text>
  <text x="280" y="215" class="text-sub" text-anchor="middle">Async Engine</text>

  <rect x="420" y="70" width="160" height="60" class="box" />
  <text x="500" y="95" class="text-title" text-anchor="middle">DNS / Infra Cell</text>
  <text x="500" y="115" class="text-sub" text-anchor="middle">crt.sh &amp; CNAME</text>

  <rect x="420" y="170" width="160" height="60" class="box" />
  <text x="500" y="195" class="text-title" text-anchor="middle">Network Cell</text>
  <text x="500" y="215" class="text-sub" text-anchor="middle">Port Fingerprinting</text>

  <rect x="420" y="270" width="160" height="60" class="box" />
  <text x="500" y="295" class="text-title" text-anchor="middle">Web Sniper</text>
  <text x="500" y="315" class="text-sub" text-anchor="middle">JS Bundle Parsing</text>

  <rect x="660" y="160" width="140" height="80" class="box-glow" />
  <text x="730" y="195" class="text-title" text-anchor="middle" fill="#58a6ff">Tactician Engine</text>
  <text x="730" y="215" class="text-sub" text-anchor="middle">Correlation Logic</text>

  <rect x="860" y="170" width="100" height="60" class="box-db" />
  <text x="910" y="195" class="text-title" text-anchor="middle" fill="#bc8cff">DynamoDB</text>
  <text x="910" y="215" class="text-sub" text-anchor="middle">AWS Archive</text>

  <circle r="4" class="packet-blue"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#path-api" /></animateMotion></circle>
  
  <circle r="4" class="packet-blue"><animateMotion dur="2.5s" repeatCount="indefinite"><mpath href="#path-dns" /></animateMotion></circle>
  <circle r="4" class="packet-blue"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#path-net" /></animateMotion></circle>
  <circle r="4" class="packet-blue"><animateMotion dur="2.7s" repeatCount="indefinite"><mpath href="#path-web" /></animateMotion></circle>

  <circle r="4" class="packet-blue"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#path-eng-1" /></animateMotion></circle>
  <circle r="4" class="packet-blue"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#path-eng-2" /></animateMotion></circle>
  <circle r="4" class="packet-blue"><animateMotion dur="2.1s" repeatCount="indefinite"><mpath href="#path-eng-3" /></animateMotion></circle>

  <circle r="4" class="packet-purple"><animateMotion dur="3s" repeatCount="indefinite"><mpath href="#path-db" /></animateMotion></circle>
</svg>