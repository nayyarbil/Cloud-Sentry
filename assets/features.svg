<svg viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: transparent; }
    .card { fill: #0d1117; stroke: #21262d; stroke-width: 1px; rx: 8px; }
    .card-top { fill: #161b22; rx: 8px; }
    .title { fill: #c9d1d9; font-family: -apple-system, sans-serif; font-size: 16px; font-weight: 600; }
    .desc { fill: #8b949e; font-family: -apple-system, sans-serif; font-size: 13px; line-height: 1.5; }
    .code { fill: #a5d6ff; font-family: monospace; font-size: 12px; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <g transform="translate(10, 10)">
    <rect width="310" height="190" class="card" />
    <rect width="310" height="40" class="card-top" />
    <path d="M 0 40 L 310 40" stroke="#21262d" stroke-width="1" />
    <circle cx="20" cy="20" r="5" fill="#58a6ff" />
    <text x="35" y="25" class="title">DNS Infrastructure</text>
    <text x="20" y="70" class="desc">Deep OSINT footprinting.</text>
    <text x="20" y="95" class="desc">Actively validates dangling</text>
    <text x="20" y="120" class="desc">CNAME records for cloud</text>
    <text x="20" y="145" class="desc">takeover vulnerabilities.</text>
    <text x="20" y="175" class="code">> crt.sh / virustotal</text>
  </g>

  <g transform="translate(340, 10)">
    <rect width="310" height="190" class="card" />
    <rect width="310" height="40" class="card-top" />
    <path d="M 0 40 L 310 40" stroke="#21262d" stroke-width="1" />
    <circle cx="20" cy="20" r="5" fill="#3fb950" />
    <text x="35" y="25" class="title">Network Surface</text>
    <text x="20" y="70" class="desc">High-value port profiling.</text>
    <text x="20" y="95" class="desc">Bypasses standard scans to</text>
    <text x="20" y="120" class="desc">target Docker APIs, Redis,</text>
    <text x="20" y="145" class="desc">and internal databases.</text>
    <text x="20" y="175" class="code">> passive shodan cve mapping</text>
  </g>

  <g transform="translate(670, 10)">
    <rect width="310" height="190" class="card" />
    <rect width="310" height="40" class="card-top" />
    <path d="M 0 40 L 310 40" stroke="#21262d" stroke-width="1" />
    <circle cx="20" cy="20" r="5" fill="#f85149" />
    <text x="35" y="25" class="title">Web Sniper</text>
    <text x="20" y="70" class="desc">Status-aware endpoint crawl.</text>
    <text x="20" y="95" class="desc">Parses JS bundles to extract</text>
    <text x="20" y="120" class="desc">hardcoded cloud secrets and</text>
    <text x="20" y="145" class="desc">unlinked internal routes.</text>
    <text x="20" y="175" class="code">> regex secret extraction</text>
  </g>
</svg>